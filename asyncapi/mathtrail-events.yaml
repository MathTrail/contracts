asyncapi: 3.0.0
info:
  title: MathTrail Event Catalog
  version: 0.1.0
  description: |
    Event contracts for MathTrail platform EDA stack.

    - **Stack:** RisingWave CDC → AutoMQ (MinIO) → Protobuf + CloudEvents Binary Mode
    - **Wire format:** Confluent Wire Format — `[0x00][4-byte schema_id][protobuf bytes]`
    - **Schema Registry:** Apicurio Registry (Confluent compat API v7)
    - **CloudEvents:** Binary Mode — CE attributes in Kafka record headers

servers:
  local-automq:
    host: automq-broker:9092
    protocol: kafka
    description: AutoMQ broker (local k3d cluster). SASL_PLAINTEXT / SCRAM-SHA-512.
    security:
      - $ref: "#/components/securitySchemes/scramSha512"

channels:
  students/onboarding/ready:
    address: students.onboarding.ready
    description: |
      Published when a new student identity is active and ready for mentor assignment.

      Produced by RisingWave materialized view joining identities + verifiable_addresses.
    messages:
      studentOnboardingReady:
        $ref: "#/components/messages/StudentOnboardingReady"

  identity/users/created:
    address: identity.users.created
    description: |
      Published when a new Kratos identity is created (CDC from public.identities).

      Produced by RisingWave CDC source.
    messages:
      userCreated:
        $ref: "#/components/messages/UserCreated"

  identity/addresses/created:
    address: identity.addresses.created
    description: |
      Published when a verifiable address is created (CDC from public.identity_verifiable_addresses).

      Produced by RisingWave CDC source.
    messages:
      addressCreated:
        $ref: "#/components/messages/AddressCreated"

  students/onboarding/ready/dlq:
    address: students.onboarding.ready.dlq
    description: Dead-letter queue for StudentOnboardingReady events that fail schema validation in mentor-api.

  canvas/strokes:
    address: canvas.strokes
    description: |
      Published when a student submits stylus strokes on the math canvas.
      Produced by canvas-api after validating the Ory session.

      **Wire format:** Plain Protobuf binary — NO Confluent Wire Format prefix, NO CloudEvents headers.

      Partition key = `session_id` (bytes) — guarantees per-session stroke ordering.
    messages:
      canvasStrokeEvent:
        $ref: "#/components/messages/CanvasStrokeEvent"

  canvas/hints:
    address: canvas.hints
    description: |
      Published by AI/LLM services after analysing student strokes.
      Consumed by canvas-api, which forwards hints to the student canvas in real time via Centrifugo WebSocket.

      **Wire format:** Plain Protobuf binary — NO Confluent Wire Format prefix, NO CloudEvents headers.

      Partition key = `session_id` (bytes).
    messages:
      hintEvent:
        $ref: "#/components/messages/HintEvent"

operations:
  publishStudentOnboardingReady:
    action: send
    channel:
      $ref: "#/channels/students~1onboarding~1ready"
    description: RisingWave publishes StudentOnboardingReady after joining CDC tables.

  consumeStudentOnboardingReady:
    action: receive
    channel:
      $ref: "#/channels/students~1onboarding~1ready"
    description: mentor-api consumes StudentOnboardingReady to create mentor recommendations.

  publishCanvasStrokeEvent:
    action: send
    channel:
      $ref: "#/channels/canvas~1strokes"
    description: canvas-api publishes CanvasStrokeEvent after validating the student session.

  consumeCanvasHint:
    action: receive
    channel:
      $ref: "#/channels/canvas~1hints"
    description: canvas-api consumes HintEvent and pushes it to the student canvas via Centrifugo WebSocket.

components:
  messages:
    StudentOnboardingReady:
      name: StudentOnboardingReady
      title: Student Onboarding Ready
      summary: A student identity is active and ready for mentor matching.
      contentType: application/vnd.google.protobuf
      headers:
        type: object
        additionalProperties: false
        properties:
          ce-specversion:
            type: string
            const: "1.0"
            description: CloudEvents spec version
          ce-type:
            type: string
            const: com.mathtrail.students.onboarding.ready
            description: CloudEvents event type
          ce-source:
            type: string
            const: /mathtrail/risingwave
            description: CloudEvents source
          ce-id:
            type: string
            description: CloudEvents unique event ID (UUID v4, generated per message)
          ce-time:
            type: string
            description: CloudEvents event time (ISO 8601)
        required:
          - ce-specversion
          - ce-type
          - ce-source
          - ce-id
          - ce-time
      payload:
        type: object
        additionalProperties: false
        description: |
          - Protobuf message: `students.v1.StudentOnboardingReady`
          - Schema: `proto/students/v1/events.proto`
          - Apicurio subject: `students.v1.StudentOnboardingReady`
        properties:
          event_id:
            type: string
            description: Unique event ID (UUID v4)
          user_id:
            type: string
            description: Kratos identity ID (UUID)
          email:
            type: string
            description: Verified email address
          first_name:
            type: string
          last_name:
            type: string
          role:
            type: string
            const: student
          occurred_at:
            type: string
            description: ISO 8601 timestamp

    UserCreated:
      name: UserCreated
      title: User Created
      summary: A new Kratos identity was created (CDC event).
      contentType: application/vnd.google.protobuf
      headers:
        type: object
        additionalProperties: false
        properties:
          ce-specversion:
            type: string
            const: "1.0"
          ce-type:
            type: string
            const: com.mathtrail.identity.user.created
          ce-source:
            type: string
            const: /mathtrail/risingwave
          ce-id:
            type: string
          ce-time:
            type: string
      payload:
        type: object
        additionalProperties: false
        description: |
          - Protobuf message: `identity.v1.UserCreated`
          - Schema: `proto/identity/v1/events.proto`
          - Apicurio subject: `identity.v1.UserCreated`

    AddressCreated:
      name: AddressCreated
      title: Address Created
      summary: A verifiable address was added to a Kratos identity (CDC event).
      contentType: application/vnd.google.protobuf
      headers:
        type: object
        additionalProperties: false
        properties:
          ce-specversion:
            type: string
            const: "1.0"
          ce-type:
            type: string
            const: com.mathtrail.identity.address.created
          ce-source:
            type: string
            const: /mathtrail/risingwave
          ce-id:
            type: string
          ce-time:
            type: string
      payload:
        type: object
        additionalProperties: false
        description: |
          - Protobuf message: `identity.v1.AddressCreated`
          - Schema: `proto/identity/v1/events.proto`
          - Apicurio subject: `identity.v1.AddressCreated`

    CanvasStrokeEvent:
      name: CanvasStrokeEvent
      title: Canvas Stroke Event
      summary: A batch of stylus strokes submitted by a student on the math canvas.
      contentType: application/vnd.google.protobuf
      description: |
        - **Wire format:** Plain Protobuf binary (no Confluent Wire Format prefix, no CloudEvents headers).
        - Schema: `proto/canvas/v1/stroke.proto` · message `canvas.v1.CanvasStrokeEvent`
        - Apicurio: not registered — direct Protobuf, no schema registry lookup.
      payload:
        type: object
        additionalProperties: false
        description: Protobuf message `canvas.v1.CanvasStrokeEvent`
        properties:
          event_id:
            type: string
            description: Unique event ID (UUID v4)
          session_id:
            type: string
            description: Canvas session ID — also used as Kafka partition key
          task_id:
            type: string
            description: Task being solved
          user_id:
            type: string
            description: Student Kratos identity ID (stamped server-side, not trusted from client)
          strokes:
            type: array
            description: Batch of strokes with points and tool type
            items:
              type: object
              additionalProperties: false
              properties:
                id:
                  type: string
                tool:
                  type: string
                  description: '"pen" or "eraser"'
                points:
                  type: array
                  items:
                    type: object
                    additionalProperties: false
                    properties:
                      x: { type: number }
                      y: { type: number }
                      pressure: { type: number }
          occurred_at:
            type: string
            description: ISO 8601 timestamp

    HintEvent:
      name: HintEvent
      title: Hint Event
      summary: An AI-generated hint for a specific region of the student's canvas.
      contentType: application/vnd.google.protobuf
      description: |
        - **Wire format:** Plain Protobuf binary (no Confluent Wire Format prefix, no CloudEvents headers).
        - Schema: `proto/canvas/v1/hint.proto` · message `canvas.v1.HintEvent`
        - Apicurio: not registered — direct Protobuf, no schema registry lookup.

        Consumed by canvas-api → forwarded to `canvas:{session_id}` Centrifugo channel via HTTP Publish API.
      payload:
        type: object
        additionalProperties: false
        description: Protobuf message `canvas.v1.HintEvent`
        properties:
          id:
            type: string
            description: Unique hint ID (UUID v4) — used as React key on the client
          session_id:
            type: string
            description: Canvas session ID — routes the hint to the correct Centrifugo channel
          hint_text:
            type: string
            description: Human-readable hint text displayed below the highlight rect
          rect:
            type: object
            additionalProperties: false
            description: Canvas area to highlight (in Konva stage coordinates)
            properties:
              x: { type: number }
              y: { type: number }
              width: { type: number }
              height: { type: number }
          hint_type:
            type: string
            description: '"warning" (red) or "success" (green)'
          occurred_at:
            type: string
            description: ISO 8601 timestamp

  securitySchemes:
    scramSha512:
      type: scramSha512
      description: SASL/SCRAM-SHA-512. Credentials delivered via Vault VSO → K8s Secret.
