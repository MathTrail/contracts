server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # EventCatalog is a SPA — fallback to index.html for client-side routing
    location /observability/eventcatalog {
        try_files $uri $uri/ /observability/eventcatalog/index.html;
    }

    # Static assets with caching
    location /observability/eventcatalog/_next/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
